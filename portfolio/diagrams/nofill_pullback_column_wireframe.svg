<svg viewBox="0 0 1040 820" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Limit No-Fill Log: adding live Pullback Ticks + Suggested columns (dashboard port 8766)</title>
<desc>Data flow: temalimit.cs already writes each template's pullbackTicksByTicker into temalimit_template_reference.json. A new Python function reads that same file (same pattern as the existing risk map) and joins it onto each Template x Instrument no-fill bucket, alongside a suggested reduced value computed from the no-fill count. Two new columns get added to the existing table -- no new card, no changes to temalimit.cs.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#556070"/>
  </marker>
  <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1a1f27; }
  .box { fill: #f4f6f8; stroke: #6b7684; stroke-width: 1; }
  .boxTitle { font-size: 15px; font-weight: 600; }
  .boxSub { font-size: 12px; fill: #4b5563; }
  .boxMono { font-size: 11px; fill: #374151; font-family: Consolas, "Courier New", monospace; }
  .edge { fill: none; stroke: #556070; stroke-width: 1.5; }
  .edgeAccent { fill: none; stroke: #3b82f6; stroke-width: 1.5; }
  .sectionLabel { font-size: 13px; font-weight: 600; fill: #4b5563; }
  .th { font-size: 11px; font-weight: 600; fill: #1a1f27; }
  .td { font-size: 11px; fill: #374151; }
  .tdMuted { font-size: 11px; fill: #6b7684; }
  .tdNew { font-size: 11px; fill: #1d4ed8; font-weight: 600; }
</style>

<rect x="0" y="0" width="1040" height="820" fill="#ffffff"/>

<!-- source of truth -->
<rect x="330" y="16" width="380" height="60" rx="8" class="box"/>
<text x="520" y="38" text-anchor="middle" class="boxTitle">temalimit_template_reference.json</text>
<text x="520" y="56" text-anchor="middle" class="boxSub">already written by temalimit.cs -- has pullbackTicksByTicker per template</text>

<path class="edge" d="M520,76 L520,108" marker-end="url(#arrow)"/>

<!-- new python function -->
<rect x="290" y="108" width="460" height="70" rx="8" class="box" stroke="#3b82f6" stroke-width="1.5"/>
<text x="520" y="132" text-anchor="middle" class="boxTitle">New: build_template_pullback_map()</text>
<text x="520" y="152" text-anchor="middle" class="boxMono">same pattern as existing build_template_risk_map()</text>
<text x="520" y="168" text-anchor="middle" class="boxSub">ticker -&gt; template# -&gt; current pullback ticks</text>

<path class="edgeAccent" d="M520,178 L520,210" marker-end="url(#arrowAccent)"/>

<!-- enrichment step -->
<rect x="230" y="210" width="580" height="110" rx="8" class="box" stroke="#3b82f6" stroke-width="1.5"/>
<text x="520" y="232" text-anchor="middle" class="boxTitle">build_nofill_stats() -- existing function, enriched</text>
<text x="520" y="254" text-anchor="middle" class="boxSub">for each existing Template x Instrument bucket, join in:</text>
<text x="520" y="274" text-anchor="middle" class="boxMono">currentPullbackTicks = pullback_map[ticker][template]</text>
<text x="520" y="292" text-anchor="middle" class="boxMono">suggestedPullbackTicks = same formula as the earlier wireframe</text>
<text x="520" y="308" text-anchor="middle" class="tdMuted">(Threshold=3, Sensitivity=3%/excess no-fill, MaxReduction=30%)</text>

<path class="edgeAccent" d="M520,320 L520,352" marker-end="url(#arrowAccent)"/>

<!-- frontend table -->
<rect x="60" y="352" width="920" height="290" rx="8" class="box"/>
<text x="520" y="376" text-anchor="middle" class="boxTitle">dashboard.html -- "By Template x Instrument" table, 2 new columns</text>

<!-- table header -->
<line x1="90" y1="400" x2="950" y2="400" stroke="#6b7684" stroke-width="1"/>
<text x="110" y="396" class="th">Template</text>
<text x="230" y="396" class="th">Instrument</text>
<text x="350" y="396" class="th">No-Fills</text>
<text x="470" y="396" class="th">Avg Wait</text>
<text x="600" y="396" class="tdNew">Pullback Ticks (live)</text>
<text x="800" y="396" class="tdNew">Suggested</text>
<line x1="90" y1="404" x2="950" y2="404" stroke="#6b7684" stroke-width="1"/>

<!-- rows using real data pulled from today's temalimit_template_reference.json -->
<text x="110" y="426" class="td">T29</text><text x="230" y="426" class="td">RTY</text><text x="350" y="426" class="td">8</text><text x="470" y="426" class="td">4.136 min</text>
<text x="600" y="426" class="td">15 ticks</text><text x="800" y="426" class="tdNew">13 ticks (-15%)</text>

<text x="110" y="450" class="td">T39</text><text x="230" y="450" class="td">RTY</text><text x="350" y="450" class="td">5</text><text x="470" y="450" class="td">6.186 min</text>
<text x="600" y="450" class="td">17 ticks</text><text x="800" y="450" class="tdNew">16 ticks (-6%)</text>

<text x="110" y="474" class="td">T32</text><text x="230" y="474" class="td">ES</text><text x="350" y="474" class="td">3</text><text x="470" y="474" class="td">4.003 min</text>
<text x="600" y="474" class="td">15 ticks</text><text x="800" y="474" class="tdMuted">-- (within range)</text>

<text x="110" y="498" class="td">T34</text><text x="230" y="498" class="td">ES</text><text x="350" y="498" class="td">3</text><text x="470" y="498" class="td">5.08 min</text>
<text x="600" y="498" class="td">16 ticks</text><text x="800" y="498" class="tdMuted">-- (within range)</text>

<text x="110" y="522" class="td">T38</text><text x="230" y="522" class="td">ES</text><text x="350" y="522" class="td">3</text><text x="470" y="522" class="td">5.013 min</text>
<text x="600" y="522" class="td">16 ticks</text><text x="800" y="522" class="tdMuted">-- (within range)</text>

<text x="110" y="556" class="tdMuted">first 4 columns: existing, unchanged</text>
<text x="600" y="556" class="tdMuted">last 2 columns: new, values pulled live from</text>
<text x="600" y="572" class="tdMuted">temalimit_template_reference.json + the suggestion formula</text>

<!-- click behavior note -->
<rect x="90" y="592" width="860" height="40" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
<text x="520" y="616" text-anchor="middle" class="td">"Suggested" is read-only display, same as everything else on this card -- no button applies it automatically.</text>

<!-- scope note -->
<rect x="90" y="646" width="860" height="80" rx="6" class="box" stroke="#3b82f6"/>
<text x="520" y="668" text-anchor="middle" class="boxTitle">Scope</text>
<text x="520" y="688" text-anchor="middle" class="td">temalimit.cs is not touched -- it already exports pullbackTicksByTicker today.</text>
<text x="520" y="706" text-anchor="middle" class="td">Only live_dashboard_server.py (1 new function + a join) and dashboard.html (2 table columns) change.</text>

<!-- legend -->
<rect x="330" y="760" width="14" height="14" fill="none" stroke="#6b7684"/>
<text x="352" y="771" class="boxSub">existing, unchanged</text>
<rect x="530" y="760" width="14" height="14" fill="none" stroke="#3b82f6"/>
<text x="552" y="771" class="boxSub">new (not yet built)</text>
</svg>
