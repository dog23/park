<svg viewBox="0 0 920 640" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Template Mode 3 (Unused Only) rotation flow in temalimit.cs</title>
<desc>Flowchart: on start, Mode 3 loads the usage file and activates the lowest-numbered unused template. From there two independent triggers can move it: a completed trade marks the template used and jumps to the new lowest unused template; a no-fill timeout instead just steps to current+1, wrapping at MaxTemplateNumber, without touching the usage file.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#556070"/>
  </marker>
  <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
  </marker>
</defs>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1a1f27; }
  .box { fill: #f4f6f8; stroke: #6b7684; stroke-width: 1; }
  .boxTitle { font-size: 15px; font-weight: 600; }
  .boxSub { font-size: 12px; fill: #4b5563; }
  .edgeLabel { font-size: 12px; fill: #4b5563; }
  .edge { fill: none; stroke: #556070; stroke-width: 1.5; }
  .edgeAccent { fill: none; stroke: #3b82f6; stroke-width: 1.5; }
  .sectionLabel { font-size: 13px; font-weight: 600; fill: #4b5563; }
</style>

<rect x="0" y="0" width="920" height="640" fill="#ffffff"/>

<!-- Start -->
<rect x="360" y="16" width="200" height="56" rx="8" class="box"/>
<text x="460" y="40" text-anchor="middle" class="boxTitle">Start / restart</text>
<text x="460" y="58" text-anchor="middle" class="boxSub">strategy instance</text>

<path class="edge" d="M460,72 L460,104" marker-end="url(#arrow)"/>

<!-- Load usage -->
<rect x="330" y="104" width="260" height="56" rx="8" class="box"/>
<text x="460" y="128" text-anchor="middle" class="boxTitle">Load usage file</text>
<text x="460" y="146" text-anchor="middle" class="boxSub">temalimit_template_usage_*.txt</text>

<path class="edge" d="M460,160 L460,192" marker-end="url(#arrow)"/>

<!-- Active template (hub) -->
<rect x="330" y="192" width="260" height="64" rx="8" class="box" stroke="#3b82f6" stroke-width="1.5"/>
<text x="460" y="219" text-anchor="middle" class="boxTitle">Active = lowest unused</text>
<text x="460" y="237" text-anchor="middle" class="boxSub">ApplyTemplate(n)</text>

<!-- Left branch: fill / trade closes -->
<path class="edge" d="M330,224 C180,224 180,320 180,352" marker-end="url(#arrow)"/>
<text x="90" y="290" class="sectionLabel">on a fill</text>

<rect x="60" y="352" width="240" height="56" rx="8" class="box"/>
<text x="180" y="376" text-anchor="middle" class="boxTitle">Trade closes</text>
<text x="180" y="394" text-anchor="middle" class="boxSub">win or loss</text>

<path class="edge" d="M180,408 L180,440" marker-end="url(#arrow)"/>

<rect x="60" y="440" width="240" height="56" rx="8" class="box"/>
<text x="180" y="464" text-anchor="middle" class="boxTitle">Mark template used</text>
<text x="180" y="482" text-anchor="middle" class="boxSub">written to usage file</text>

<path class="edge" d="M180,496 C180,560 300,560 330,232" marker-end="url(#arrow)"/>
<text x="185" y="576" class="edgeLabel">pick new lowest unused</text>

<!-- Right branch: no-fill timeout (today's fix) -->
<path class="edgeAccent" d="M590,224 C740,224 740,320 740,352" marker-end="url(#arrowAccent)"/>
<text x="700" y="290" class="sectionLabel">no-fill timeout</text>

<rect x="620" y="352" width="240" height="56" rx="8" class="box" stroke="#3b82f6"/>
<text x="740" y="371" text-anchor="middle" class="boxTitle">No fill by timeout</text>
<text x="740" y="389" text-anchor="middle" class="boxSub">34.5 / 69 min window</text>

<path class="edgeAccent" d="M740,408 L740,440" marker-end="url(#arrowAccent)"/>

<rect x="620" y="440" width="240" height="56" rx="8" class="box" stroke="#3b82f6"/>
<text x="740" y="459" text-anchor="middle" class="boxTitle">Advance current + 1</text>
<text x="740" y="477" text-anchor="middle" class="boxSub">wraps at MaxTemplateNumber</text>

<path class="edgeAccent" d="M740,496 C740,560 620,560 590,232" marker-end="url(#arrowAccent)"/>
<text x="640" y="576" class="edgeLabel">usage file untouched</text>

<!-- Legend -->
<rect x="330" y="600" width="14" height="14" fill="none" stroke="#6b7684"/>
<text x="352" y="611" class="edgeLabel">fill-driven path</text>
<rect x="470" y="600" width="14" height="14" fill="none" stroke="#3b82f6"/>
<text x="492" y="611" class="edgeLabel">no-fill timeout path (fixed 2026-07-14)</text>
</svg>
