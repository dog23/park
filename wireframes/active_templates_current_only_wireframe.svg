<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <title>Active Templates card: current template only</title>
  <desc>Before/after wireframe: the card used to list every temalimit_template_state file on disk, including files stranded by an instance's previous data-series config. It now shows only the newest file per account+instrument, i.e. each instance's current template.</desc>
  <style>
    .h { font-size: 14px; font-weight: 600; fill: #222; }
    .sub { font-size: 11px; fill: #666; }
    .cell { font-size: 11px; fill: #333; }
    .cellm { font-size: 11px; fill: #999; }
    .stale { font-size: 11px; fill: #b04a4a; text-decoration: line-through; }
    .note { font-size: 10.5px; fill: #b04a4a; }
    .notegood { font-size: 10.5px; fill: #2e7d52; }
    .th { font-size: 10px; fill: #888; font-weight: 600; }
  </style>

  <text x="20" y="24" class="h">Active Templates (Live) — 8765 Models page</text>
  <text x="20" y="40" class="sub">One strategy instance = account + instrument. State FILE is named per data series, so old series' files linger on disk.</text>

  <!-- BEFORE panel -->
  <rect x="20" y="56" width="350" height="330" rx="8" fill="#f6f6f6" stroke="#ccc"/>
  <text x="36" y="80" class="h">Before — every state file (61 rows)</text>
  <rect x="36" y="92" width="318" height="250" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="48" y="112" class="th">ACCOUNT</text><text x="160" y="112" class="th">SERIES</text><text x="262" y="112" class="th">TMPL</text><text x="300" y="112" class="th">ROTATED</text>
  <line x1="44" y1="118" x2="346" y2="118" stroke="#e5e5e5"/>
  <text x="48" y="134" class="cell">Simvolume NQ</text><text x="160" y="134" class="cell">Volume 1000</text><text x="262" y="134" class="cell">19</text><text x="300" y="134" class="cellm">Jul 17</text>
  <text x="48" y="152" class="cell">Simvolume YM</text><text x="160" y="152" class="cell">Volume 1000</text><text x="262" y="152" class="cell">19</text><text x="300" y="152" class="cellm">Jul 17</text>
  <text x="48" y="170" class="stale">Simvolume YM</text><text x="160" y="170" class="stale">Range 60</text><text x="262" y="170" class="stale">1</text><text x="300" y="170" class="stale">Jul 9</text>
  <text x="48" y="188" class="stale">Simvolume RTY</text><text x="160" y="188" class="stale">Range 60</text><text x="262" y="188" class="stale">1</text><text x="300" y="188" class="stale">Jul 9</text>
  <text x="48" y="206" class="stale">Simvolume ES</text><text x="160" y="206" class="stale">Range 60</text><text x="262" y="206" class="stale">1</text><text x="300" y="206" class="stale">Jul 9</text>
  <text x="48" y="224" class="stale">Simtime ES</text><text x="160" y="224" class="stale">Minute 5</text><text x="262" y="224" class="stale">1</text><text x="300" y="224" class="stale">Jul 9</text>
  <text x="48" y="242" class="stale">Account YM</text><text x="160" y="242" class="stale">Renko 15</text><text x="262" y="242" class="stale">11</text><text x="300" y="242" class="stale">Jul 15</text>
  <text x="48" y="260" class="stale">Account YM</text><text x="160" y="260" class="stale">Minute 1</text><text x="262" y="260" class="stale">4</text><text x="300" y="260" class="stale">Jul 14</text>
  <text x="48" y="278" class="cell">Account YM</text><text x="160" y="278" class="cell">HeikenAshi 1</text><text x="262" y="278" class="cell">14</text><text x="300" y="278" class="cellm">Jul 15</text>
  <text x="48" y="296" class="cellm">... 52 more rows ...</text>
  <text x="36" y="362" class="note">Struck rows = stranded files from a PREVIOUS series config,</text>
  <text x="36" y="376" class="note">shown as if they were live instances.</text>

  <!-- arrow -->
  <line x1="378" y1="220" x2="398" y2="220" stroke="#888" stroke-width="2"/>
  <path d="M398 220 l-7 -5 v10 z" fill="#888"/>

  <!-- AFTER panel -->
  <rect x="404" y="56" width="336" height="330" rx="8" fill="#f0f7f2" stroke="#9fc7ae"/>
  <text x="420" y="80" class="h">After — newest file per instance (52 rows)</text>
  <rect x="420" y="92" width="304" height="214" rx="6" fill="#fff" stroke="#ddd"/>
  <text x="432" y="112" class="th">ACCOUNT</text><text x="540" y="112" class="th">SERIES</text><text x="636" y="112" class="th">TMPL</text><text x="672" y="112" class="th">ROTATED</text>
  <line x1="428" y1="118" x2="716" y2="118" stroke="#e5e5e5"/>
  <text x="432" y="134" class="cell">Simvolume ES</text><text x="540" y="134" class="cell">Volume 1000</text><text x="636" y="134" class="cell">2</text><text x="672" y="134" class="cellm">Jul 17</text>
  <text x="432" y="152" class="cell">Simvolume NQ</text><text x="540" y="152" class="cell">Volume 1000</text><text x="636" y="152" class="cell">19</text><text x="672" y="152" class="cellm">Jul 17</text>
  <text x="432" y="170" class="cell">Simvolume RTY</text><text x="540" y="170" class="cell">Volume 1000</text><text x="636" y="170" class="cell">17</text><text x="672" y="170" class="cellm">Jul 17</text>
  <text x="432" y="188" class="cell">Simvolume YM</text><text x="540" y="188" class="cell">Volume 1000</text><text x="636" y="188" class="cell">19</text><text x="672" y="188" class="cellm">Jul 17</text>
  <text x="432" y="206" class="cell">Account YM</text><text x="540" y="206" class="cell">HeikenAshi 1</text><text x="636" y="206" class="cell">14</text><text x="672" y="206" class="cellm">Jul 15</text>
  <text x="432" y="224" class="cell">Simtema ES</text><text x="540" y="224" class="cell">LineBreak 3</text><text x="636" y="224" class="cell">37</text><text x="672" y="224" class="cellm">today</text>
  <text x="432" y="242" class="cellm">... one row per account+instrument ...</text>
  <text x="420" y="326" class="notegood">Dedupe rule: keep the file with the newest mtime per</text>
  <text x="420" y="340" class="notegood">account+instrument. Its first field IS the current template.</text>
  <text x="420" y="362" class="notegood">Simvolume shows only its live Volume 1000 templates —</text>
  <text x="420" y="376" class="notegood">the July 9 Range 60 leftovers are hidden.</text>
</svg>
